<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>son</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f5f0;
        --text: #27241f;
        --muted: #6f675c;
        --line: #ded7cb;
        --card: #fffdf8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      main {
        width: min(880px, calc(100% - 40px));
        margin: 0 auto;
        padding: 72px 0;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 5vw, 3.6rem);
        line-height: 1.05;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.7;
      }

      .posts {
        display: grid;
        gap: 14px;
        margin-top: 42px;
      }

      a {
        color: inherit;
      }

      .post {
        display: block;
        padding: 22px 24px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--card);
        text-decoration: none;
      }

      .post:hover {
        border-color: #b9aa92;
      }

      .post h2 {
        margin: 0 0 8px;
        font-size: 1.25rem;
        line-height: 1.35;
        letter-spacing: 0;
      }

      .post span {
        color: var(--muted);
        font-size: 0.95rem;
      }

      .support-link {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        margin-top: 28px;
        padding: 20px 22px;
        border: 1px solid #cdbf9f;
        border-radius: 8px;
        background: #fff8e7;
        text-decoration: none;
      }

      .support-link h2 {
        margin: 0;
        font-size: 1.12rem;
        line-height: 1.35;
        letter-spacing: 0;
      }

      .support-link span {
        flex: 0 0 auto;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .support-link:hover {
        border-color: #aa9369;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>son</h1>
      <p>글 목록</p>

      <a class="support-link" href="https://counseling-production-b285.up.railway.app/chat" target="_blank" rel="noopener noreferrer">
        <h2>불안할 때 상담하기</h2>
        <span>열기</span>
      </a>

      <section class="posts" aria-label="글 목록">
        <a class="post" href="./life.html">
          <h2>삶</h2>
          <span>보기</span>
        </a>
        <a class="post" href="./good-person.html">
          <h2>어떤 사람이 되고 싶니</h2>
          <span>읽기</span>
        </a>
        <a class="post" href="./poster.html">
          <h2>기준 한 장으로 보기</h2>
          <span>인쇄용</span>
        </a>
        <a class="post" href="./independence">
          <h2>자립</h2>
          <span>읽기</span>
        </a>
        <a class="post" href="./books-exercise-instruments.html">
          <h2>책, 운동, 악기</h2>
          <span>읽기</span>
        </a>
        <a class="post" href="./anxiety.html">
          <h2>불안에 대한 생각</h2>
          <span>읽기</span>
        </a>
        <a class="post" href="./busan.html">
          <h2>부산 가족여행 3박4일</h2>
          <span>지도·관광지·맛집</span>
        </a>
      </section>
    </main>
  </body>
</html>
