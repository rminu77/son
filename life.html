<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>삶</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f5f0;
        --text: #27241f;
        --muted: #6f675c;
        --line: #ded7cb;
        --card: #fffdf8;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      main {
        width: min(880px, calc(100% - 40px));
        margin: 0 auto;
        padding: 40px 0 72px;
      }
      .back {
        display: inline-block;
        margin-bottom: 24px;
        color: var(--muted);
        font-size: 0.95rem;
        text-decoration: none;
      }
      .back:hover { color: var(--text); }
      h1 {
        margin: 0 0 18px;
        font-size: clamp(1.8rem, 5vw, 3rem);
        line-height: 1.1;
        letter-spacing: 0;
      }
      .player {
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: hidden;
        background: #000;
      }
      video {
        display: block;
        width: 100%;
        height: auto;
        max-height: 80vh;
        background: #000;
      }
      .note {
        margin: 16px 2px 0;
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.6;
      }
      .note a { color: inherit; }
    </style>
  </head>
  <body>
    <main>
      <a class="back" href="./">← 목록으로</a>
      <h1>삶</h1>
      <div class="player">
        <video controls playsinline preload="metadata">
          <source src="./life.mp4" type="video/mp4">
          이 브라우저는 영상을 재생할 수 없어요. <a href="./life.mp4">영상 내려받기</a>
        </video>
      </div>
      <p class="note">재생이 안 되면 <a href="./life.mp4">여기서 영상을 내려받아</a> 볼 수 있어요.</p>
    </main>
  </body>
</html>
