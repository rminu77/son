<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>부산 가족여행 3박4일 · 카카오맵 동선</title>
<style>
  :root{
    --d1:#2563eb; --d2:#16a34a; --d3:#ea580c; --d4:#9333ea; --hotel:#e11d48;
    --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb; --bg:#f8fafc;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Malgun Gothic",sans-serif;color:var(--ink);background:var(--bg);}
  header{padding:20px 22px 16px;background:linear-gradient(135deg,#0f172a,#1e3a8a);color:#fff;}
  header h1{margin:0;font-size:20px;letter-spacing:-.4px;}
  header p{margin:6px 0 0;font-size:13px;opacity:.85;}
  .wrap{max-width:1100px;margin:0 auto;padding:0 14px 60px;}
  .filters{display:flex;flex-wrap:wrap;gap:8px;padding:14px 0;}
  .chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;color:var(--muted);}
  .chip:hover{transform:translateY(-1px);}
  .chip.active{color:#fff;border-color:transparent;}
  .chip[data-day="all"].active{background:#0f172a;}
  .chip[data-day="1"].active{background:var(--d1);}
  .chip[data-day="2"].active{background:var(--d2);}
  .chip[data-day="3"].active{background:var(--d3);}
  .chip[data-day="4"].active{background:var(--d4);}
  #map{width:100%;height:62vh;min-height:420px;border-radius:16px;box-shadow:0 6px 24px rgba(15,23,42,.12);overflow:hidden;}
  .maperr{display:flex;align-items:center;justify-content:center;height:100%;padding:30px;text-align:center;font-size:13px;color:var(--muted);line-height:1.7;background:#f1f5f9;}
  .note{font-size:12px;color:var(--muted);margin:10px 2px 0;line-height:1.6;}
  .hint{font-size:12px;color:#92400e;background:#fef3c7;border:1px solid #fde68a;border-radius:10px;padding:10px 12px;margin:10px 0 0;line-height:1.6;}
  /* kakao markers */
  .kpin{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.4);color:#fff;font-weight:800;font-size:13px;cursor:pointer;}
  .kpin.hotel{width:34px;height:34px;font-size:17px;}
  /* kakao popup */
  .kpop{position:relative;width:240px;background:#fff;border-radius:12px;box-shadow:0 8px 24px rgba(15,23,42,.28);padding:12px 14px;border:1px solid var(--line);}
  .kpop::after{content:'';position:absolute;left:50%;bottom:-9px;transform:translateX(-50%);border:9px solid transparent;border-top-color:#fff;}
  .kpop-x{position:absolute;top:7px;right:9px;border:none;background:none;font-size:18px;line-height:1;color:#9ca3af;cursor:pointer;}
  .pop-day{font-size:11px;font-weight:800;letter-spacing:.3px;padding-right:16px;}
  .pop-name{font-size:15px;font-weight:800;margin:2px 0 4px;}
  .pop-addr{font-size:12px;color:var(--muted);margin-bottom:6px;}
  .pop-row{font-size:12.5px;margin:3px 0;line-height:1.5;}
  .pop-links{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap;}
  .pop-links a{font-size:12px;font-weight:700;text-decoration:none;padding:5px 9px;border-radius:7px;background:#f1f5f9;color:#0f172a;border:1px solid var(--line);}
  .pop-links a:hover{background:#e2e8f0;}
  /* itinerary */
  h2.sec{font-size:16px;margin:34px 2px 12px;}
  .day-block{margin-bottom:18px;}
  .day-head{display:flex;align-items:center;gap:8px;font-weight:800;font-size:14px;margin-bottom:8px;}
  .day-dot{width:12px;height:12px;border-radius:50%;}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px;}
  .card{background:#fff;border:1px solid var(--line);border-left-width:4px;border-radius:12px;padding:11px 13px;cursor:pointer;transition:.15s;}
  .card:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(15,23,42,.1);}
  .card .seq{font-size:11px;font-weight:800;color:var(--muted);}
  .card .nm{font-size:14px;font-weight:800;margin:2px 0 4px;}
  .card .mt{font-size:12px;color:var(--muted);line-height:1.5;}
  footer{font-size:11.5px;color:var(--muted);margin-top:30px;line-height:1.7;border-top:1px solid var(--line);padding-top:14px;}
</style>
</head>
<body>
<header>
  <h1>🗺️ 부산 가족여행 3박4일 · 카카오맵 동선</h1>
  <p>2026.7.19(일)~7.22(수) · 부부+14세 아들 · 택시 이동 · 숙소: 그랜드 조선 부산</p>
</header>

<div class="wrap">
  <div class="filters" id="filters">
    <button class="chip active" data-day="all">전체</button>
    <button class="chip" data-day="1">Day 1 · 7/19</button>
    <button class="chip" data-day="2">Day 2 · 7/20</button>
    <button class="chip" data-day="3">Day 3 · 7/21</button>
    <button class="chip" data-day="4">Day 4 · 7/22</button>
  </div>

  <div id="map"><div class="maperr">지도를 불러오는 중…</div></div>

  <h2 class="sec">📋 날짜별 일정</h2>
  <div id="itinerary"></div>

</div>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=69bf1427ead55f419e9b644ef7ee1b88&autoload=false"></script>
<script>
const DAYS = {
  0:{label:'숙소(베이스캠프)',color:'#e11d48'},
  1:{label:'Day 1 · 7/19(일)',color:'#2563eb'},
  2:{label:'Day 2 · 7/20(월)',color:'#16a34a'},
  3:{label:'Day 3 · 7/21(화)',color:'#ea580c'},
  4:{label:'Day 4 · 7/22(수)',color:'#9333ea'},
};
const C = {
  hotel:[35.1583,129.1618], beach:[35.1588,129.1600], xsky:[35.1602,129.1693],
  mipo:[35.1605,129.1738], bay:[35.1558,129.1502], oryukdo:[35.1017,129.1247],
  gwangalli:[35.1531,129.1188], songdo:[35.0760,129.0165], nampo:[35.0975,129.0305],
  busan:[35.1152,129.0424]
};
const PLACES = [
  {day:0,seq:'🏨',hotel:true,name:'그랜드 조선 부산',pos:C.hotel,addr:'해운대구 해운대해변로 292',
   cost:'오션뷰 1박 30만~45만(예상)',tip:'체크인 15:00/아웃 11:00 · 6층 오션뷰 인피니티풀 · 3인 객실(엑스트라베드) 확인'},
  {day:1,seq:1,name:'해운대 해수욕장',pos:C.beach,addr:'해운대구 중동2로 11',time:'15:30~',cost:'무료',tip:'도착 첫날 가볍게 산책/물놀이'},
  {day:1,seq:2,name:'부산 엑스더스카이',pos:C.xsky,addr:'해운대구 달맞이길 30',time:'18:30',cost:'27,000원(온라인 ~23,200)',tip:'일몰 30분 전 입장 → 노을+야경 · 100층 스타벅스 · 유리바닥'},
  {day:2,seq:1,name:'해운대 해변(물놀이)',pos:C.beach,addr:'해운대구',time:'09:00',cost:'무료(파라솔 1만)',tip:'개장 직후가 가장 한산'},
  {day:2,seq:2,name:'블루라인파크(미포정거장)',pos:C.mipo,addr:'해운대구 청사포로 116',time:'12:30',cost:'스카이캡슐 3인승 편도 45,000',tip:'미포→청사포 캡슐 → 해변열차 복귀 · 사전예약 필수'},
  {day:2,seq:3,name:'더베이101',pos:C.bay,addr:'해운대구 동백로 52',time:'18:30',cost:'야경 무료 / 야간요트 34,000~',tip:'일몰·야경 · 야간 요트투어(광안대교 불꽃)'},
  {day:3,seq:1,name:'오륙도 스카이워크',pos:C.oryukdo,addr:'남구 오륙도로 137',time:'09:30',cost:'무료',tip:'오전 추천 · 투명유리, 덧신 착용 · 이기대 해안산책로'},
  {day:3,seq:2,name:'광안리 해수욕장',pos:C.gwangalli,addr:'수영구 광안해변로',time:'오후~저녁',cost:'무료',tip:'해변·카페·광안대교 야경 (드론쇼는 토요일만이라 제외)'},
  {day:4,seq:1,name:'송도 해상케이블카',pos:C.songdo,addr:'서구 송도해변로 171',time:'11:30',cost:'크리스탈 왕복 24,000',tip:'투명바닥 크리스탈크루즈 · 송도구름산책로·용궁구름다리'},
  {day:4,seq:2,name:'자갈치·남포동(점심)',pos:C.nampo,addr:'중구 남포동',time:'13:30',cost:'-',tip:'송도와 가까움 · 점심'},
  {day:4,seq:3,station:true,name:'KTX 부산역',pos:C.busan,addr:'동구 중앙대로 206',time:'출발',cost:'-',tip:'짐 라커 보관 추천 · 송도·남포동과 가까워 동선 효율'},
];
const ROUTES = {
  1:[C.hotel,C.beach,C.xsky,C.hotel],
  2:[C.hotel,C.beach,C.mipo,C.bay,C.hotel],
  3:[C.hotel,C.oryukdo,C.gwangalli,C.hotel],
  4:[C.hotel,C.songdo,C.nampo,C.busan],
};

function popupHTML(p){
  const q = encodeURIComponent(p.name);
  const nv = `https://map.naver.com/p/search/${q}`;
  const kk = `https://map.kakao.com/?q=${q}`;
  const rt = `https://map.kakao.com/?sName=${encodeURIComponent('그랜드조선부산')}&eName=${q}`;
  const dlabel = p.day===0 ? '숙소' : DAYS[p.day].label;
  const num = (p.hotel||p.station) ? '' : `<span style="color:${DAYS[p.day].color}">${p.seq}.</span> `;
  return `<button class="kpop-x" aria-label="닫기">×</button>
    <div class="pop-day" style="color:${DAYS[p.day].color}">${dlabel}${p.time?' · '+p.time:''}</div>
    <div class="pop-name">${num}${p.name}</div>
    ${p.addr?`<div class="pop-addr">📍 ${p.addr}</div>`:''}
    ${p.cost&&p.cost!=='-'?`<div class="pop-row">💰 ${p.cost}</div>`:''}
    ${p.tip?`<div class="pop-row">💡 ${p.tip}</div>`:''}
    <div class="pop-links">
      <a href="${nv}" target="_blank" rel="noopener">네이버지도</a>
      <a href="${kk}" target="_blank" rel="noopener">카카오맵</a>
      ${p.hotel?'':`<a href="${rt}" target="_blank" rel="noopener">길찾기 🚕</a>`}
    </div>`;
}

function boot(){
  if(!window.kakao || !window.kakao.maps){
    document.getElementById('map').innerHTML =
      '<div class="maperr">카카오맵 SDK를 불러오지 못했습니다.<br/>JavaScript 키와 도메인 등록(플랫폼 &gt; Web)을 확인해 주세요.<br/>인터넷 연결도 확인하세요.</div>';
    return;
  }
  kakao.maps.load(initMap);
}

function initMap(){
  const map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(35.12, 129.09), level: 9
  });
  map.addControl(new kakao.maps.ZoomControl(), kakao.maps.ControlPosition.RIGHT);

  const ll = (pt)=> new kakao.maps.LatLng(pt[0], pt[1]);
  const pinsByDay = {0:[],1:[],2:[],3:[],4:[]};
  const infos = [];
  const pinList = [];
  let openInfo = null;

  function closeInfo(){ if(openInfo){ openInfo.setMap(null); openInfo=null; } }
  function openPopup(i){
    closeInfo();
    infos[i].setMap(map);
    openInfo = infos[i];
  }

  PLACES.forEach((p, i)=>{
    // pin
    const pinEl = document.createElement('div');
    pinEl.className = 'kpin' + (p.hotel?' hotel':'');
    pinEl.style.background = DAYS[p.day].color;
    pinEl.textContent = p.hotel ? '🏨' : (p.station ? '🚄' : p.seq);
    pinEl.addEventListener('click', (e)=>{ e.stopPropagation(); openPopup(i); });
    const pin = new kakao.maps.CustomOverlay({ position: ll(p.pos), content: pinEl, xAnchor:0.5, yAnchor:0.5, zIndex:3, clickable:true });
    pinsByDay[p.day].push(pin);
    pinList.push(pin);

    // info popup
    const popEl = document.createElement('div');
    popEl.className = 'kpop';
    popEl.innerHTML = popupHTML(p);
    popEl.querySelector('.kpop-x').addEventListener('click', (e)=>{ e.stopPropagation(); closeInfo(); });
    const info = new kakao.maps.CustomOverlay({ position: ll(p.pos), content: popEl, xAnchor:0.5, yAnchor:1.18, zIndex:6, clickable:true });
    infos.push(info);
  });

  const routeLines = {};
  Object.keys(ROUTES).forEach(d=>{
    routeLines[d] = new kakao.maps.Polyline({
      path: ROUTES[d].map(ll), strokeWeight:4, strokeColor:DAYS[d].color, strokeOpacity:0.7, strokeStyle:'shortdash'
    });
  });

  kakao.maps.event.addListener(map, 'click', closeInfo);

  function boundsFor(points){
    const b = new kakao.maps.LatLngBounds();
    points.forEach(pt=> b.extend(ll(pt)));
    return b;
  }
  const allBounds = boundsFor(PLACES.map(p=>p.pos));

  function render(sel){
    closeInfo();
    Object.keys(pinsByDay).forEach(d=>{
      const dn=Number(d);
      const show = sel==='all' || dn===sel || dn===0;
      pinsByDay[d].forEach(pin=> pin.setMap(show ? map : null));
    });
    Object.keys(routeLines).forEach(d=>{
      const dn=Number(d);
      const show = sel==='all' || dn===sel;
      routeLines[d].setMap(show ? map : null);
    });
    if(sel==='all') map.setBounds(allBounds);
    else map.setBounds(boundsFor(PLACES.filter(p=>p.day===sel||p.day===0).map(p=>p.pos)));
  }

  render('all');

  document.querySelectorAll('.chip').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.chip').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const v = btn.dataset.day;
      render(v==='all' ? 'all' : Number(v));
    });
  });

  // itinerary cards
  const itin = document.getElementById('itinerary');
  [1,2,3,4].forEach(d=>{
    const block = document.createElement('div');
    block.className='day-block';
    block.innerHTML = `<div class="day-head"><span class="day-dot" style="background:${DAYS[d].color}"></span>${DAYS[d].label}</div>`;
    const cards = document.createElement('div');
    cards.className='cards';
    PLACES.forEach((p,idx)=>{
      if(p.day!==d) return;
      const card = document.createElement('div');
      card.className='card';
      card.style.borderLeftColor = DAYS[d].color;
      card.innerHTML = `<div class="seq">${p.time||''}</div>
        <div class="nm">${p.station?'🚄 ':''}${typeof p.seq==='number'?p.seq+'. ':''}${p.name}</div>
        <div class="mt">${p.cost&&p.cost!=='-'?'💰 '+p.cost+'<br/>':''}${p.tip||''}</div>`;
      card.addEventListener('click', ()=>{
        map.setLevel(4);
        map.panTo(ll(p.pos));
        openPopup(idx);
        window.scrollTo({top:0, behavior:'smooth'});
      });
      cards.appendChild(card);
    });
    block.appendChild(cards);
    itin.appendChild(block);
  });
}

boot();
</script>
</body>
</html>
