<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>son</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f5f0;
        --text: #27241f;
        --muted: #6f675c;
        --line: #ded7cb;
        --card: #fffdf8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      main {
        width: min(880px, calc(100% - 40px));
        margin: 0 auto;
        padding: 72px 0;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 5vw, 3.6rem);
        line-height: 1.05;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.7;
      }

      .posts {
        display: grid;
        gap: 14px;
        margin-top: 42px;
      }

      a {
        color: inherit;
      }

      .post {
        display: block;
        padding: 22px 24px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--card);
        text-decoration: none;
      }

      .post:hover {
        border-color: #b9aa92;
      }

      .post h2 {
        margin: 0 0 8px;
        font-size: 1.25rem;
        line-height: 1.35;
        letter-spacing: 0;
      }

      .post span {
        color: var(--muted);
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>son</h1>
      <p>글 목록</p>

      <section class="posts" aria-label="글 목록">
        <a class="post" href="./anxiety.html">
          <h2>불안에 대한 생각</h2>
          <span>읽기</span>
        </a>
        <a class="post" href="./books-exercise-instruments.html">
          <h2>책, 운동, 악기</h2>
          <span>읽기</span>
        </a>
        <a class="post" href="./independence.html">
          <h2>자립</h2>
          <span>읽기</span>
        </a>
      </section>
    </main>
  </body>
</html>
